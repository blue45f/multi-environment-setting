<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA / icons -->
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="theme-color" content="#2563eb" />

    <title>Multi-Environment Demo — Build once · Deploy many 멀티환경 레퍼런스</title>
    <meta
      name="description"
      content="PR마다 격리된 preview, staging 검증, production 승격까지 — 한 번 빌드한 정적 산출물에 env.json만 갈아끼워 배포하는 S3+CloudFront·GitHub OIDC 멀티환경 레퍼런스"
    />

    <!--
      정적 OG / Twitter / canonical 기본값. usePageMeta() (src/lib/usePageMeta.ts) 는
      라우트별 title·description 만 런타임에 갱신하므로, JS를 실행하지 않는 SNS 크롤러
      (Kakao·Facebook·Slack 등)에게는 아래 정적 메타가 곧 공유 미리보기다.
      base URL 은 저장소의 sitemap.xml·robots.txt 와 동일한 production origin 으로 맞춘다.
    -->
    <link rel="canonical" href="https://multi-beta-guide.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Multi-Environment Demo" />
    <meta property="og:title" content="Multi-Environment Demo — Build once · Deploy many" />
    <meta
      property="og:description"
      content="PR마다 격리된 preview, staging 검증, production 승격까지 — 한 번 빌드한 정적 산출물에 env.json만 갈아끼워 배포하는 S3+CloudFront·GitHub OIDC 멀티환경 레퍼런스"
    />
    <meta property="og:url" content="https://multi-beta-guide.vercel.app/" />
    <meta property="og:image" content="https://multi-beta-guide.vercel.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta
      property="og:image:alt"
      content="Multi-Environment Demo — Build once · Deploy many 멀티환경 레퍼런스"
    />
    <meta property="og:locale" content="ko_KR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Multi-Environment Demo — Build once · Deploy many" />
    <meta
      name="twitter:description"
      content="PR마다 격리된 preview, staging 검증, production 승격까지 — 한 번 빌드한 정적 산출물에 env.json만 갈아끼워 배포하는 S3+CloudFront·GitHub OIDC 멀티환경 레퍼런스"
    />
    <meta name="twitter:image" content="https://multi-beta-guide.vercel.app/og.png" />
    <meta
      name="twitter:image:alt"
      content="Multi-Environment Demo — Build once · Deploy many 멀티환경 레퍼런스"
    />

    <!--
      no-FOUC pre-paint: 첫 페인트 전에 저장된 테마 선호를 <html data-theme>에 박는다.
      'system'(or 미설정)이면 data-theme를 비워 globals.css의 prefers-color-scheme가 결정한다.
      globals.css 토큰이 [data-theme] 와 prefers-color-scheme 둘 다를 다루므로,
      이 스크립트는 깜빡임(light→dark 점프)만 막는 역할이다.
    -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('theme')
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t)
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

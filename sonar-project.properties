# Run with SONAR_HOST_URL and SONAR_TOKEN supplied by your shell or CI secrets.
sonar.projectKey=multi-environment-setting
sonar.projectName=multi-environment-setting
sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true
sonar.sources=.
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.next/**,**/out/**,**/.vercel/**,**/.turbo/**,**/.cache/**,**/storybook-static/**,**/pnpm-lock.yaml,**/package-lock.json,**/yarn.lock,**/bun.lockb,**/*.min.js,**/*.generated.*,**/generated/**,**/public/**/*.png,**/public/**/*.jpg,**/public/**/*.jpeg,**/public/**/*.webp,**/public/**/*.avif,**/public/**/*.ico,**/public/**/*.svg
sonar.coverage.exclusions=**/*.test.*,**/*.spec.*,**/test/**,**/tests/**,**/*.config.*,**/scripts/**,**/docs/**,**/public/**,**/infra/**
sonar.cpd.exclusions=**/*.test.*,**/*.spec.*,**/infra/**
sonar.typescript.tsconfigPaths=apps/web/tsconfig.json

sonar.javascript.node.maxspace=4096

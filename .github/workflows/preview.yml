name: preview

# PR마다 각 서비스(var.services)의 고유 preview URL을 만든다. (가이드 §4.4)
#   서비스 매트릭스 × (lint/typecheck/test/build → S3 업로드 → invalidation → PR 코멘트)
# 서비스별 역할/배포 ID/도메인은 GitHub var DEPLOY_CONFIG(JSON)에서 가져온다(gh-setup.sh가 채움).
# DEPLOY_CONFIG가 비어 있으면(부트스트랩 전) job은 자동 skip된다.
# PR close 정리는 cleanup-preview.yml이 담당한다.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  id-token: write
  pull-requests: write
  deployments: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: vars.DEPLOY_CONFIG != ''
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(vars.SERVICES || '["web"]') }}
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.url.outputs.url }}
    env:
      SERVICE: ${{ matrix.service }}
      APP_DIR: apps/${{ matrix.service }}
      OUTPUT_DIR: apps/${{ matrix.service }}/out
      PR: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: corepack enable

      - name: Install
        working-directory: ${{ env.APP_DIR }}
        run: pnpm install --frozen-lockfile

      # 검증 게이트: 하나라도 실패하면 배포하지 않는다.
      - name: Lint
        working-directory: ${{ env.APP_DIR }}
        run: pnpm lint
      - name: Typecheck
        working-directory: ${{ env.APP_DIR }}
        run: pnpm typecheck
      - name: Test
        working-directory: ${{ env.APP_DIR }}
        run: pnpm test
      - name: Build (static export)
        working-directory: ${{ env.APP_DIR }}
        run: pnpm build

      - name: Select runtime config + deployment metadata
        run: |
          cp "${APP_DIR}/public/env.preview.json" "${OUTPUT_DIR}/env.json"
          cat > "${OUTPUT_DIR}/deployment.json" <<EOF
          {
            "service": "${SERVICE}",
            "environment": "preview",
            "pullRequest": ${PR},
            "sourceRevision": "${GITHUB_SHA}",
            "deployedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Configure AWS credentials (OIDC, preview role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ fromJSON(vars.DEPLOY_CONFIG)[matrix.service].preview_role_arn }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to S3 (cache-control 분리)
        run: ./scripts/deploy-s3.sh "${OUTPUT_DIR}" "s3://${{ vars.ARTIFACT_BUCKET }}/${SERVICE}/pr-${PR}"

      - name: Invalidate CloudFront (이 서비스/PR prefix만)
        run: ./scripts/invalidate.sh "${{ fromJSON(vars.DEPLOY_CONFIG)[matrix.service].preview_distribution_id }}" "/${SERVICE}/pr-${PR}/*"

      # (선택) Pattern B — Amplify manual deploy. vars.AMPLIFY_APP_ID가 설정된 경우에만.
      - name: Amplify manual deployment (optional)
        if: vars.AMPLIFY_APP_ID != ''
        run: |
          aws amplify start-deployment \
            --app-id "${{ vars.AMPLIFY_APP_ID }}" \
            --branch-name "${SERVICE}-pr-${PR}" \
            --source-url-type BUCKET_PREFIX \
            --source-url "s3://${{ vars.ARTIFACT_BUCKET }}/${SERVICE}/pr-${PR}/"

      - name: Compute preview URL
        id: url
        run: echo "url=https://${{ fromJSON(vars.DEPLOY_CONFIG)[matrix.service].preview_cloudfront_domain }}/pr-${PR}/" >> "$GITHUB_OUTPUT"

      - name: Wait for URL
        run: |
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.url.outputs.url }}" || true)
            if [ "$code" = "200" ]; then echo "ready"; exit 0; fi
            echo "waiting ($i): http=$code"; sleep 5
          done
          echo "URL not ready in time"; exit 1

      - name: Install Playwright browser
        working-directory: ${{ env.APP_DIR }}
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke test (deployed URL 기준)
        working-directory: ${{ env.APP_DIR }}
        run: pnpm exec playwright test tests/smoke --project=chromium
        env:
          BASE_URL: ${{ steps.url.outputs.url }}

      - name: Comment preview URL (upsert, 서비스별)
        uses: actions/github-script@v9
        env:
          PREVIEW_URL: ${{ steps.url.outputs.url }}
          SERVICE: ${{ matrix.service }}
        with:
          script: |
            const service = process.env.SERVICE;
            const marker = `<!-- preview-bot-${service} -->`;
            const sha = context.sha.slice(0, 7);
            const body = [
              marker,
              `## 🚀 \`${service}\` Preview 배포 완료`,
              '',
              '| 항목 | 값 |',
              '| --- | --- |',
              `| URL | ${process.env.PREVIEW_URL} |`,
              `| Revision | \`${sha}\` |`,
              `| 만료 | PR close 또는 일일 cleanup |`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

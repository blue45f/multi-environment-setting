name: deploy

# build-once, deploy-many. (가이드 §4.3) 서비스(var.services)마다 매트릭스로 실행.
#   build → deploy-staging → (production environment reviewer 승인) → deploy-production
# 서비스별 역할/배포 ID/도메인은 GitHub var DEPLOY_CONFIG(JSON)에서 가져온다(gh-setup.sh가 채움).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 배포 대상
        type: choice
        options: [staging, production]
        default: staging

permissions:
  contents: read
  id-token: write
  deployments: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1) 서비스별로 한 번만 빌드 → GitHub artifact ──────────────────────────
  build:
    if: vars.DEPLOY_CONFIG != ''
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(vars.SERVICES || '["web"]') }}
    runs-on: ubuntu-latest
    env:
      APP_DIR: apps/${{ matrix.service }}
      OUTPUT_DIR: apps/${{ matrix.service }}/dist
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - name: Install
        working-directory: ${{ env.APP_DIR }}
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: ${{ env.APP_DIR }}
        run: pnpm lint
      - name: Typecheck
        working-directory: ${{ env.APP_DIR }}
        run: pnpm typecheck
      - name: Test
        working-directory: ${{ env.APP_DIR }}
        run: pnpm test
      - name: Build (static export)
        working-directory: ${{ env.APP_DIR }}
        run: pnpm build
      - name: Package artifact + checksum
        run: |
          tar -czf app.tar.gz -C "${OUTPUT_DIR}" .
          sha256sum app.tar.gz > app.tar.gz.sha256
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-${{ matrix.service }}-${{ github.sha }}
          path: |
            app.tar.gz
            app.tar.gz.sha256
          retention-days: 14

  # ── 2) staging 배포 ───────────────────────────────────────────────────────
  deploy-staging:
    needs: build
    if: ${{ vars.DEPLOY_CONFIG != '' && (github.event_name == 'push' || inputs.target == 'staging' || inputs.target == 'production') }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(vars.SERVICES || '["web"]') }}
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://${{ fromJSON(vars.DEPLOY_CONFIG)[matrix.service].staging_cloudfront_domain }}/
    env:
      SERVICE: ${{ matrix.service }}
      APP_DIR: apps/${{ matrix.service }}
      OUTPUT_DIR: apps/${{ matrix.service }}/dist
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: frontend-${{ matrix.service }}-${{ github.sha }}
      - name: Unpack + select runtime config
        run: |
          sha256sum -c app.tar.gz.sha256
          ARTIFACT_SHA256="$(cut -d ' ' -f1 app.tar.gz.sha256)"
          mkdir -p "${OUTPUT_DIR}"
          tar -xzf app.tar.gz -C "${OUTPUT_DIR}"
          cp "${APP_DIR}/public/env.staging.json" "${OUTPUT_DIR}/env.json"
          cat > "${OUTPUT_DIR}/deployment.json" <<EOF
          {
            "service": "${SERVICE}",
            "environment": "staging",
            "sourceRevision": "${GITHUB_SHA}",
            "artifactSha256": "${ARTIFACT_SHA256}",
            "deployedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
      - name: Configure AWS credentials (OIDC, staging role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ fromJSON(vars.DEPLOY_CONFIG)[matrix.service].staging_role_arn }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Upload immutable release + promote to current
        run: |
          BASE="s3://${{ vars.ARTIFACT_BUCKET }}/${SERVICE}/staging"
          ./scripts/deploy-s3.sh "${OUTPUT_DIR}" "${BASE}/releases/${GITHUB_SHA}"
          ./scripts/promote.sh "${BASE}/releases/${GITHUB_SHA}" "${BASE}/current"
      - name: Invalidate CloudFront (entry/config만)
        run: ./scripts/invalidate.sh "${{ fromJSON(vars.DEPLOY_CONFIG)[matrix.service].staging_distribution_id }}" "/index.html" "/env.json" "/deployment.json"
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - name: Install app deps (smoke)
        working-directory: ${{ env.APP_DIR }}
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        working-directory: ${{ env.APP_DIR }}
        run: pnpm exec playwright install --with-deps chromium
      - name: Smoke test
        working-directory: ${{ env.APP_DIR }}
        run: pnpm exec playwright test tests/smoke --project=chromium
        env:
          BASE_URL: https://${{ fromJSON(vars.DEPLOY_CONFIG)[matrix.service].staging_cloudfront_domain }}/

  # ── 3) production 배포 (environment reviewer 승인 후) ──────────────────────
  deploy-production:
    needs: [build, deploy-staging]
    if: ${{ vars.DEPLOY_CONFIG != '' && (github.event_name == 'push' || inputs.target == 'production') }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(vars.SERVICES || '["web"]') }}
    runs-on: ubuntu-latest
    environment:
      name: production # ← Settings에서 required reviewers를 걸면 이 지점에서 승인 대기
      url: https://${{ fromJSON(vars.DEPLOY_CONFIG)[matrix.service].production_cloudfront_domain }}/
    env:
      SERVICE: ${{ matrix.service }}
      APP_DIR: apps/${{ matrix.service }}
      OUTPUT_DIR: apps/${{ matrix.service }}/dist
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: frontend-${{ matrix.service }}-${{ github.sha }}
      - name: Unpack + select runtime config
        run: |
          sha256sum -c app.tar.gz.sha256
          ARTIFACT_SHA256="$(cut -d ' ' -f1 app.tar.gz.sha256)"
          mkdir -p "${OUTPUT_DIR}"
          tar -xzf app.tar.gz -C "${OUTPUT_DIR}"
          cp "${APP_DIR}/public/env.production.json" "${OUTPUT_DIR}/env.json"
          cat > "${OUTPUT_DIR}/deployment.json" <<EOF
          {
            "service": "${SERVICE}",
            "environment": "production",
            "sourceRevision": "${GITHUB_SHA}",
            "artifactSha256": "${ARTIFACT_SHA256}",
            "deployedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
      - name: Configure AWS credentials (OIDC, production role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ fromJSON(vars.DEPLOY_CONFIG)[matrix.service].production_role_arn }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Upload immutable release + promote to current
        run: |
          BASE="s3://${{ vars.ARTIFACT_BUCKET }}/${SERVICE}/production"
          ./scripts/deploy-s3.sh "${OUTPUT_DIR}" "${BASE}/releases/${GITHUB_SHA}"
          ./scripts/promote.sh "${BASE}/releases/${GITHUB_SHA}" "${BASE}/current"
      - name: Invalidate CloudFront (entry/config만)
        run: ./scripts/invalidate.sh "${{ fromJSON(vars.DEPLOY_CONFIG)[matrix.service].production_distribution_id }}" "/index.html" "/env.json" "/deployment.json"
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: corepack enable
      - name: Install app deps (smoke)
        working-directory: ${{ env.APP_DIR }}
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        working-directory: ${{ env.APP_DIR }}
        run: pnpm exec playwright install --with-deps chromium
      - name: Smoke test
        working-directory: ${{ env.APP_DIR }}
        run: pnpm exec playwright test tests/smoke --project=chromium
        env:
          BASE_URL: https://${{ fromJSON(vars.DEPLOY_CONFIG)[matrix.service].production_cloudfront_domain }}/
